name: dart_tutorial
description: A personal playground for learning the Dart language and Flutter.
version: 0.1.0
publish_to: none

# The Dart SDK version this project is written against.
# `dart --version` shows what you have installed locally.
environment:
  sdk: ^3.8.0

# Runtime packages your lessons/library code depend on go here.
# Add packages with:  dart pub add <package_name>
dependencies:

# Tooling used only during development (tests, linters). Never shipped.
dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
